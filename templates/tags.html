{% extends "base.html" %}
{% block title %}Page Name{% endblock %}
{% block content %}
<h2>Tags</h2>

<table id="tagsTable">
    <thead>
        <tr>
            <th class="hidden">ID</th>
            <th>Name</th>
            <th class="delete-col"></th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<button id="addTagBtn" style="margin-top:10px;">+ Add Tag</button>


<script>
    fetch('http://127.0.0.1:5000/tags')
        .then(res => res.json())
        .then(data => {
            const tbody = document.querySelector('#tagsTable tbody');
            const tableBody = document.querySelector('#tagsTable tbody');
            const addBtn = document.getElementById('addTagBtn');

            function loadTags() {
                fetch('http://127.0.0.1:5000/tags')
                    .then(res => res.json())
                    .then(data => {
                        tableBody.innerHTML = '';
                        data.forEach(t => createRow(t));
                    });
            }

            data.forEach(t => {
                const row = document.createElement('tr');

                row.innerHTML = `
            <td class="hidden">${t[0]}</td>
            <td>${t[1]}</td>
            <td class="delete-cell">
              <button class="deleteBtn">×</button>
            </td>
          `;
                tableBody.appendChild(row);
            });

            function createRow(t) {
                const row = document.createElement('tr');

                const isNew = !t[0];
                const tagId = t[0] || '';
                const tagName = t[1] || (isNew ? '' : '');

                row.innerHTML = `
                    <td class="hidden">${tagId}</td>
                    <td contenteditable="true">${tagName}</td>

                    <td class="delete-cell">
                    <button class="deleteBtn">×</button>
                    </td>
                `;

                // Auto-save on blur
                row.querySelector('[contenteditable="true"]').addEventListener('blur', () => saveRow(row));

                // Delete
                row.querySelector('.deleteBtn').addEventListener('click', () => {
                    const id = row.querySelector('td.hidden').textContent.trim();
                    if (!id) return;

                    fetch(`http://127.0.0.1:5000/tags/${id}`, { method: 'DELETE' })
                        .then(() => row.remove());
                });

                tableBody.appendChild(row);

                if (isNew) {
                    saveRow(row);
                }
            }

            function saveRow(row) {
                const cells = row.querySelectorAll('td');
                const id = cells[0].textContent;

                const payload = {
                    name: cells[1].textContent.trim()
                };

                const method = id ? 'PUT' : 'POST';
                const url = id
                    ? `http://127.0.0.1:5000/tags/${id}`
                    : 'http://127.0.0.1:5000/tags';

                fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                    .then(res => res.json())
                    .then(data => {
                        if (!id && data.tagId) {
                            cells[0].textContent = data.tagId;
                        }
                    });
            }

            addBtn.addEventListener('click', () => {
                createRow(['', '']);
            });
            loadTags();
        });
</script>

<style>
    .hidden {
        display: none;
    }

    .delete-col {
        width: 40px;
        border-left: none;
    }

    .delete-cell {
        text-align: center;
        border-left: none;
    }

    .deleteBtn {
        cursor: pointer;
        border: none;
        background: none;
        font-size: 1.3em;
        color: #b30000;
        font-weight: bold;
    }

    .deleteBtn:hover {
        color: #ff0000;
    }

    table,
    th,
    td {
        border: 1px solid #ccc;
        border-collapse: collapse;
    }

    th,
    td {
        padding: 8px;
    }
</style>
{% endblock %}
