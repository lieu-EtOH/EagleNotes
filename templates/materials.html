{% extends "base.html" %}
{% block title %}Page Name{% endblock %}
{% block content %}

<h2>Course Materials</h2>
<table id="materialsTable">
  <thead>
    <tr>
      <th class="hidden">ID</th>
      <th>Course</th>
      <th>Title</th>
      <th>Type</th>
      <th>File Path</th>
      <th class="delete-col"></th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<button id="addMaterialBtn" style="margin-top:10px;">+ Add Material</button>

  <script>
    // Automatically choose the correct backend depending on environment
    const API_BASE = window.location.hostname === 'localhost'
      ? '${API_BASE}'
      : 'https://eaglenotes.onrender.com';

    let courses = [];
    const tableBody = document.querySelector('#materialsTable tbody');
    const addBtn = document.getElementById('addMaterialBtn');

    function loadCourses() {
    let courses = [];
    const tableBody = document.querySelector('#materialsTable tbody');
    const addBtn = document.getElementById('addMaterialBtn');

    function loadCourses() {
    return fetch('${API_BASE}/courses')
        .then(res => res.json())
        .then(data => {
            courses = data.map(c => ({
                id: c[0],
                title: c[2]
            }));
        });
    }

    function loadMaterials() {
    fetch('${API_BASE}/materials')
        .then(res => res.json())
        .then(data => {
            tableBody.innerHTML = '';
            data.forEach(m => createRow(m));
        });
    }

    function createRow(m) {
        const row = document.createElement('tr');

        const isNew = !m[0];
        const materialId = m[0] || '';
        const courseId = m[1] || '';
        const titleValue = m[2] || (isNew ? '' : '');
        const typeValue = m[3] || '';
        const filepathValue = m[4] || '';

        let courseOptions = courses.map(c =>
            `<option value="${c.id}" ${String(c.id) === String(courseId) ? 'selected' : ''}>${c.title}</option>`
        ).join('');

        row.innerHTML = `
            <td class="hidden">${materialId}</td>

            <td>
            <select class="courseSelect">
                ${courseOptions}
            </select>
            </td>

            <td contenteditable="true">${titleValue}</td>
            <td contenteditable="true">${typeValue}</td>
            <td contenteditable="true">${filepathValue}</td>

            <td class="delete-cell">
            <button class="deleteBtn">×</button>
            </td>
        `;

        // Auto-save on blur
        row.querySelectorAll('[contenteditable="true"]').forEach(cell => {
            cell.addEventListener('blur', () => saveRow(row));
        });

        // Auto-save on course change
        row.querySelector('.courseSelect').addEventListener('change', () => saveRow(row));

        // Delete
        row.querySelector('.deleteBtn').addEventListener('click', () => {
            const id = row.querySelector('td.hidden').textContent.trim();
            if (!id) return;
            
            fetch(`${API_BASE}/materials/${id}`, { method: 'DELETE' })
            .then(() => row.remove());
        });

        tableBody.appendChild(row);
        
        if (isNew) {
            saveRow(row);
        }
        }

        function saveRow(row) {
            const cells = row.querySelectorAll('td');
            const id = cells[0].textContent;

            const payload = {
                courseId: row.querySelector('.courseSelect').value,
                title: cells[2].textContent.trim(),
                type: cells[3].textContent.trim(),
                filepath: cells[4].textContent.trim()
            };

            const method = id ? 'PUT' : 'POST';
            const url = id
                ? `${API_BASE}/materials/${id}`
                : '${API_BASE}/materials';

            fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if (!id && data.materialId) {
                cells[0].textContent = data.materialId;
                }
            });
        }
    
        addBtn.addEventListener('click', () => {
            createRow(['', '', '', '', '']);
        });

    loadCourses().then(loadMaterials);
  </script>

<style>
    .delete-col {
        width: 40px;
        border-left: none;
    }

    .delete-cell {
        text-align: center;
        border-left: none;
    }


    .deleteBtn {
        cursor: pointer;
        border: none;
        background: none;
        font-size: 1.3em;
        color: #b30000;
        font-weight: bold;
    }

    .deleteBtn:hover {
        color: #ff0000;
    }

    select.courseSelect {
        width: 100%;
        padding: 4px;
        border: 1px solid #ccc;
        background: #fff;
    }

    .hidden {
         display: none;
    }

    #materialsTable th.hidden,
    #materialsTable td.hidden {
        display: none;
    }

    #materialsTable td:nth-child(2),
    #materialsTable th:nth-child(2) {
        width: 150px;   /* adjust as needed */
        max-width: 150px;
    }

    #materialsTable td:nth-child(3),
    #materialsTable th:nth-child(3) {
        width: 300px;   /* or 350px */
    }

    #materialsTable {
        table-layout: fixed;
        width: 100%;
    }

    td, th {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
</style>
{% endblock %}
