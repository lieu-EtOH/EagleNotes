<!DOCTYPE html>
<html>

<head>
    <title>Register</title>

    <style>
        @font-face {
            font-family: 'Perpetua';
            src: local('Perpetua'), local('Perpetua Regular');
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background: url('/static/img/login-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #registerTitle {
            font-family: 'Perpetua', serif;
            font-size: 64px;
            color: white;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
        }

        .parallaxFloat {
            transition: transform 0.15s ease-out;
            will-change: transform;
        }

        #registerBox {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 12px;
            width: 340px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: white;
            font-weight: 300;
            font-family: 'Perpetua', serif;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            margin-top: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 18px;
            background: #004080;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
        }

        button:hover {
            background: #003366;
        }

        #errorMsg {
            color: #ffdddd;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        a {
            color: white;
        }

        #photoCredit {
            position: fixed;
            bottom: 12px;
            width: 100%;
            text-align: center;
            font-family: 'Perpetua', serif;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.75);
            text-shadow: 0 0 6px rgba(0, 0, 0, 0.6);
        }

        #photoCredit a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
        }

        #photoCredit a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <h1 id="registerTitle" class="parallaxFloat">Create Account</h1>

    <div id="registerBox" class="parallaxFloat">

        <h2>Register</h2>

        <input type="text" id="username" placeholder="Username" />
        <input type="email" id="email" placeholder="Email" />

        <div style="position: relative; width: 100%; margin-top: 12px;">
            <input type="password" id="password" placeholder="Password" />
            <span id="togglePassword"
                style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:1.1em; color:#000000; user-select:none;">
                Show
            </span>
        </div>

        <input type="password" id="confirmPassword" placeholder="Confirm Password" />

        <button id="registerBtn">Register</button>

        <div style="text-align:center; margin-top:12px;">
            <a href="/login-page">Already have an account?</a>
        </div>

        <div id="errorMsg">Passwords do not match</div>
    </div>

    <div id="photoCredit">
        Photo by
        <a
            href="https://unsplash.com/@pawel_czerwinski?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">
            Pawel Czerwinski
        </a>
        on
        <a
            href="https://unsplash.com/photos/blue-abstract-artwork-suLgJZ1edT4?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">
            Unsplash
        </a>
    </div>

    <script>
        // Backend selection
        const API_BASE =
            window.location.hostname === 'localhost' ||
                window.location.hostname === '127.0.0.1'
                ? 'http://127.0.0.1:5000'
                : 'https://eaglenotes.onrender.com';

        // Register button
        document.getElementById("registerBtn").addEventListener("click", () => {
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const confirmPassword = document.getElementById("confirmPassword").value.trim();

            if (password !== confirmPassword) {
                document.getElementById("errorMsg").innerText = "Passwords do not match";
                document.getElementById("errorMsg").style.display = "block";
                return;
            }

            const payload = { username, email, password };

            fetch(`${API_BASE}/register`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify(payload)
            })
                .then(res => res.json())
                .then(data => {
                    if (data.userId) {
                        window.location.href = "/login-page";
                    } else {
                        document.getElementById("errorMsg").innerText = "Registration failed";
                        document.getElementById("errorMsg").style.display = "block";
                    }
                });
        });

        // Show/hide password
        document.getElementById("togglePassword").addEventListener("click", () => {
            const pass = document.getElementById("password");
            const isHidden = pass.type === "password";
            pass.type = isHidden ? "text" : "password";
            togglePassword.textContent = isHidden ? "Hide" : "Show";
        });

        // Hide error on typing
        ["username", "email", "password", "confirmPassword"].forEach(id => {
            document.getElementById(id).addEventListener("input", () => {
                document.getElementById("errorMsg").style.display = "none";
            });
        });

        // Parallax push-away effect
        document.addEventListener("mousemove", (e) => {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;

            const dx = (e.clientX - cx) / cx;
            const dy = (e.clientY - cy) / cy;

            const strength = 12;

            document.querySelectorAll(".parallaxFloat").forEach(el => {
                const offsetX = -dx * strength;
                const offsetY = -dy * strength;
                el.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
            });
        });
    </script>

</body>

</html>
