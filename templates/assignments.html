<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assignments</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <h1>Your Assignments</h1>

  <table id="assignmentsTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Course</th>
        <th>Title</th>
        <th>Due Date</th>
        <th>Status</th>
        <th>Difficulty</th>
        <th>Hours</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
  fetch('http://127.0.0.1:5000/assignments')
    .then(res => res.json())
    .then(data => {
      const tbody = document.querySelector('#assignmentsTable tbody');

      data.forEach(a => {
        const row = document.createElement('tr');

        // a[4] = dueDate
        const dueDate = new Date(a[4]);
        const today = new Date();
        let dueClass = "";

        if (a[4] && dueDate < today) {
          dueClass = "overdue";
        } else if (a[4] && (dueDate - today) / (1000 * 60 * 60 * 24) <= 3) {
          dueClass = "due-soon";
        }

        row.innerHTML = `
          <td>${a[0]}</td>   <!-- assignmentId -->
          <td>${a[1]}</td>   <!-- courseId -->
          <td>${a[2]}</td>   <!-- title -->
          <td>${a[4] || ""}</td>   <!-- dueDate -->
          <td>${a[5] || ""}</td>   <!-- status -->
          <td>${a[6] || ""}</td>   <!-- difficulty -->
          <td>${a[7] || ""}</td>   <!-- estimatedHours -->
        `;

        // apply due date color class
        if (dueClass) {
          row.children[3].classList.add(dueClass);
        }

        tbody.appendChild(row);
      });
    });
</script>

</body>
</html>
