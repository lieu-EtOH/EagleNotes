<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Courses</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <h1>Your Courses</h1>

  <table id="coursesTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Instructor</th>
        <th>Term</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    fetch('http://127.0.0.1:5000/courses')
      .then(res => res.json())
      .then(data => {
        const tbody = document.querySelector('#coursesTable tbody');
        data.forEach(course => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${course[0]}</td>
            <td>${course[2]}</td>
            <td>${course[3]}</td>
            <td>${course[4]}</td>
          `;
          tbody.appendChild(row);
        });
      });
  </script>
</body>
</html>
